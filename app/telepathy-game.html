<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Psychic101 — Telepathy Game</title>
<link rel="stylesheet" href="styles.css">
<script src="utils.js" defer></script>
<style>
  .emoji-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 0.75rem; max-width: 320px; margin: 1.5rem auto; }
  .emoji-btn { font-size: 2.5rem; padding: 1rem; background: var(--surface2); border: 2px solid var(--surface2); border-radius: var(--radius); cursor: pointer; transition: all 0.3s; text-align: center; }
  .emoji-btn:hover { border-color: var(--accent); transform: scale(1.05); }
  .emoji-btn.selected { border-color: var(--accent); background: rgba(123,104,238,0.15); transform: scale(1.1); }
  .emoji-btn.correct { border-color: var(--success); background: rgba(74,222,128,0.15); }
  .emoji-btn.wrong { border-color: var(--danger); background: rgba(248,113,113,0.1); }
  .player-section { text-align: center; padding: 1.5rem; background: var(--surface2); border-radius: var(--radius); margin-bottom: 1rem; }
  .player-label { font-size: 1.1rem; font-weight: 700; margin-bottom: 0.5rem; }
  .player-instruction { color: var(--text-dim); font-size: 0.9rem; margin-bottom: 1rem; }
  .hidden { display: none; }
  .reveal-emoji { font-size: 5rem; text-align: center; margin: 1rem 0; animation: reveal-pop 0.5s ease-out; }
  @keyframes reveal-pop { 0% { transform: scale(0); } 50% { transform: scale(1.3); } 100% { transform: scale(1); } }
  .score-display { display: flex; justify-content: center; gap: 2rem; margin: 1rem 0; }
  .score-item { text-align: center; }
  .score-value { font-size: 1.5rem; font-weight: 700; color: var(--accent); }
  .score-label { font-size: 0.75rem; color: var(--text-dim); }
  .connection-meter { height: 8px; background: var(--surface1); border-radius: 4px; margin: 1rem auto; max-width: 300px; overflow: hidden; }
  .connection-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--success)); border-radius: 4px; transition: width 0.5s ease; }
</style>
</head>
<body>
  <header>
    <div class="container">
      <a href="index.html" class="logo">Psychic101</a>
      <span data-i18n="tele-title">📡 Telepathy Game</span>
      <div id="lang-selector"></div>
    </div>
  </header>
  <main class="container">
    <div class="score-display">
      <div class="score-item"><div class="score-value" id="score-total">0</div><div class="score-label" data-i18n="tele-rounds">Rounds</div></div>
      <div class="score-item"><div class="score-value" id="score-hits">0</div><div class="score-label" data-i18n="tele-connections">Connections</div></div>
      <div class="score-item"><div class="score-value" id="score-rate">—</div><div class="score-label" data-i18n="tele-rate">Rate</div></div>
    </div>
    <div class="connection-meter"><div class="connection-fill" id="conn-fill" style="width:0%"></div></div>

    <!-- Step 1: Sender picks -->
    <div id="step-sender" class="player-section">
      <div class="player-label" data-i18n="tele-sender">🧠 Player A — Sender</div>
      <div class="player-instruction" data-i18n="tele-sender-instr">Pick an emoji and focus on it. Don't let Player B see!</div>
      <div class="emoji-grid" id="sender-grid"></div>
      <button class="btn-primary hidden" id="sender-done" onclick="stepReceiver()" data-i18n="tele-sender-done">I'm Focused — Pass to Player B</button>
    </div>

    <!-- Step 2: Receiver guesses -->
    <div id="step-receiver" class="player-section hidden">
      <div class="player-label" data-i18n="tele-receiver">👁 Player B — Receiver</div>
      <div class="player-instruction" data-i18n="tele-receiver-instr">Sense which emoji Player A is thinking of...</div>
      <div class="emoji-grid" id="receiver-grid"></div>
    </div>

    <!-- Step 3: Reveal -->
    <div id="step-reveal" class="player-section hidden">
      <div id="reveal-content"></div>
      <button class="btn-primary" onclick="nextRound()" data-i18n="tele-next">Next Round →</button>
    </div>

    <div style="text-align:center;margin-top:1.5rem">
      <button class="btn-secondary" onclick="resetScore()" data-i18n="tele-reset">Reset Score</button>
    </div>
  </main>
  <footer>
    <div class="container">
      <nav>
        <a href="index.html" data-i18n="footer-home">Home</a>
        <a href="profile.html" data-i18n="legal-profile-link">🔮 Profile</a>
        <span data-version class="footer-link"></span>
      </nav>
    </div>
  </footer>
  <script>
  const EMOJIS = ['🔮','🌙','🌊','🔥','🌸','⭐','🦋','🌈'];
  let senderPick = null;
  let score = JSON.parse(localStorage.getItem('p101_tele_score') || '{"total":0,"hits":0}');

  function buildGrid(containerId, onPick) {
    const c = document.getElementById(containerId);
    c.innerHTML = EMOJIS.map(e => '<button class="emoji-btn" onclick="this.onclick=null;' +
      'this.parentElement.querySelectorAll(\'.emoji-btn\').forEach(b=>b.classList.remove(\'selected\'));' +
      'this.classList.add(\'selected\');' + onPick + '(\'' + e + '\');">' + e + '</button>').join('');
  }

  function updateScoreUI() {
    document.getElementById('score-total').textContent = score.total;
    document.getElementById('score-hits').textContent = score.hits;
    document.getElementById('score-rate').textContent = score.total ? Math.round(score.hits / score.total * 100) + '%' : '—';
    document.getElementById('conn-fill').style.width = (score.total ? score.hits / score.total * 100 : 0) + '%';
  }

  function stepReceiver() {
    document.getElementById('step-sender').classList.add('hidden');
    document.getElementById('step-receiver').classList.remove('hidden');
    buildGrid('receiver-grid', (emoji) => {
      document.getElementById('step-receiver').classList.add('hidden');
      document.getElementById('step-reveal').classList.remove('hidden');
      const hit = emoji === senderPick;
      score.total++;
      if (hit) score.hits++;
      localStorage.setItem('p101_tele_score', JSON.stringify(score));
      updateScoreUI();

      const t = window.t || ((k) => k);
      let msg = hit
        ? '<div class="reveal-emoji">' + senderPick + '</div><h2>🔗 Telepathic Connection!</h2><p style="color:var(--success)">' + (t('tele-hit') || 'You both sensed the same emoji!') + '</p>'
        : '<div class="reveal-emoji">' + senderPick + '</div><h2>' + (t('tele-miss') || 'Not this time...') + '</h2><p style="color:var(--text-dim)">' + (t('tele-miss-msg') || 'Player A thought of ' + senderPick + ', you sensed ' + emoji + '. Keep trying — the connection grows with practice!') + '</p>';
      document.getElementById('reveal-content').innerHTML = msg;

      if (hit) spawnConfetti(20);
    playSound('hit');

      updateStreak();
      addXp(10, 'telepathy-game');
      checkAppBadge('tele', score.total);
      markAppTried('telepathy-game');
    });
  }

  function nextRound() {
    senderPick = null;
    document.getElementById('step-reveal').classList.add('hidden');
    document.getElementById('step-sender').classList.remove('hidden');
    document.getElementById('sender-done').classList.add('hidden');
    buildGrid('sender-grid', (emoji) => {
      senderPick = emoji;
      document.getElementById('sender-done').classList.remove('hidden');
    });
  }

  function resetScore() {
    score = {total: 0, hits: 0};
    localStorage.setItem('p101_tele_score', JSON.stringify(score));
    updateScoreUI();
  }

  document.addEventListener('DOMContentLoaded', () => {
    document.getElementById('lang-selector').innerHTML = langSelectorHTML();
    applyTranslations();
    renderVersion();
    updateScoreUI();
    nextRound();
    renderStreak('tele-streak');
  });
  </script>
</body>
</html>
